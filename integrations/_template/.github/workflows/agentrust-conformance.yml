# agentrust-io integration conformance template.
# Copy into your integration and replace <vendor>-<product> and <LEVEL>.
#
# Purpose: prove the integration works against the RELEASED agentrust-io packages
# and that the TRACE record it produces passes the conformance suite at the level
# claimed in integration.yaml. A clean run earns the Verified tier.
# (Manifest schema validation is handled by the repo's own validate.yml, not here.)
name: agentrust conformance
on:
  push:
    paths: ["integrations/<vendor>-<product>/**"]
  pull_request:
    paths: ["integrations/<vendor>-<product>/**"]
  schedule:
    - cron: "0 6 * * 1"   # weekly: catch drift against the latest released packages
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]   # add macos-latest / windows-latest for cross-platform coverage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}

      # Released packages only (CONTRIBUTING rule 1). Keep only the ones your
      # integration declares in integrates_with.
      - name: Install released agentrust-io packages
        run: |
          python -m pip install --upgrade pip
          pip install agentrust-trace agent-manifest cmcp-runtime
          pip install agentrust-trace-tests

      - name: Install this integration
        run: pip install -e "integrations/<vendor>-<product>[test]"

      - name: Integration tests
        run: pytest integrations/<vendor>-<product>/tests -q

      # Emit a TRACE record with your integration, then verify it at the level
      # you claim in integration.yaml (replace <LEVEL>, e.g. 0, 1, 2).
      - name: Emit a sample TRACE record
        run: python integrations/<vendor>-<product>/examples/emit_record.py --out trust-record.jwt

      - name: TRACE conformance
        run: trace-tests verify --record trust-record.jwt --level <LEVEL>

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: conformance-${{ matrix.os }}-py${{ matrix.python }}
          path: trust-record.jwt
