apiVersion: integration/v1
kind: Integration
metadata:
  name: sentinel
  displayName: Agent Sentinel
  description: Runtime behavioral anomaly detection, collusion detection, and quarantine for agent fleets.
  category: governance
  maintainer:
    name: Akhilesh Warik
    email: akhilesh.warik@example.com
    github: a1k7
  license: MIT
  version: 2.0.0
spec:
  compatibility:
    - trace-spec: v0.1
    - conformance: Level 0
  files:
    - src/
    - requirements.txt
    - README.md
  usage:
    command: |
      pip install -r requirements.txt
      # Sentinel fails closed: traces are verified before scoring. For signed
      # production traces set TRACE_TRUSTED_JWK. To run the unsigned demo trace,
      # set SENTINEL_ALLOW_UNVERIFIED=1 (logs a loud warning, dev/demo only).
      SENTINEL_ALLOW_UNVERIFIED=1 python -m src.cli sample_trace.json --output report.json
      # For fleet evaluation:
      # SENTINEL_ALLOW_UNVERIFIED=1 python -m src.cli fleet_trace.json --fleet --output fleet_report.json
  evidence:
    - type: manual
      description: |
        Agent Sentinel produces a risk score, detection list, quarantine action, and collusion patterns.