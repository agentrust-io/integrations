apiVersion: integration/v1
kind: Integration
metadata:
  name: decisionassure
  displayName: DecisionAssure
  description: Convert DecisionAssure runtime governance traces into a signed TRACE v0.1 JWT (Ed25519).
  category: governance
  maintainer:
    name: Akhilesh Warik
    email: akhilesh.warik@example.com
    github: a1k7
  license: MIT
  version: 1.0.0
spec:
  compatibility:
    - trace-spec: v0.1
    - conformance: Level 0 (software-only)
  files:
    - da_to_trace.py
    - requirements.txt
    - README.md
  usage:
    command: |
      pip install -r requirements.txt
      python da_to_trace.py decisionassure_trace.json
      # Outputs claim.jwt – the signed JWT (primary artifact)
  evidence:
    - type: trace-tests
      command: |
        trace-tests verify --record claim.jwt
      expected_output: "Result: PASS"